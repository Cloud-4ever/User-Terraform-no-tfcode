name: C4-Finder Terraform Deploy/Destroy

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - '.github/workflows/c4finder-terraform-deploy.yml'
  workflow_dispatch:
    inputs:
      operation:
        description: 'Choose terraform operation'
        required: true
        default: deploy
        type: choice
        options:
          - deploy
          - destroy

permissions:
  contents: read
  actions: read

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Detect Terraform working directory
        run: |
          if [ -d terraform/environments/dev ]; then
            echo "TF_WORKING_DIR=terraform/environments/dev" >> "$GITHUB_ENV"
          else
            echo "TF_WORKING_DIR=terraform" >> "$GITHUB_ENV"
          fi

      - name: Validate required credentials
        run: |
          test -n "${{ secrets.AWS_ACCESS_KEY_ID }}" || (echo "Missing secret: AWS_ACCESS_KEY_ID" && exit 1)
          test -n "${{ secrets.AWS_SECRET_ACCESS_KEY }}" || (echo "Missing secret: AWS_SECRET_ACCESS_KEY" && exit 1)

      - name: Resolve AWS region
        run: |
          REGION="${{ vars.AWS_REGION }}"
          if [ -z "$REGION" ]; then
            REGION="ap-northeast-1"
          fi
          echo "AWS_REGION=$REGION" >> "$GITHUB_ENV"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Collect deployment identity
        id: aws_identity
        run: |
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          CALLER_ARN="$(aws sts get-caller-identity --query Arn --output text)"
          echo "account_id=${ACCOUNT_ID}" >> "$GITHUB_OUTPUT"
          echo "caller_arn=${CALLER_ARN}" >> "$GITHUB_OUTPUT"

          cat > "$GITHUB_WORKSPACE/deployment-metadata.json" <<EOF
          {
            "aws_account_id": "${ACCOUNT_ID}",
            "caller_arn": "${CALLER_ARN}",
            "aws_region": "${AWS_REGION}",
            "workflow": "${{ github.workflow }}",
            "run_id": "${{ github.run_id }}",
            "repository": "${{ github.repository }}",
            "sha": "${{ github.sha }}",
            "ref": "${{ github.ref }}"
          }
          EOF

      - name: Upload deployment metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-metadata
          path: deployment-metadata.json

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform -chdir="$TF_WORKING_DIR" init

      - name: Terraform Validate
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.operation == 'deploy'
        run: terraform -chdir="$TF_WORKING_DIR" validate

      - name: Terraform Plan
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.operation == 'deploy'
        run: terraform -chdir="$TF_WORKING_DIR" plan -out=tfplan

      - name: Terraform Apply
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.operation == 'deploy'
        run: terraform -chdir="$TF_WORKING_DIR" apply -auto-approve tfplan

      - name: Upload Terraform state artifact
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.operation == 'deploy'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-state-${{ github.ref_name }}
          path: |
            ${{ env.TF_WORKING_DIR }}/terraform.tfstate
            ${{ env.TF_WORKING_DIR }}/terraform.tfstate.backup
          if-no-files-found: warn

      - name: Download last Terraform state artifact
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.operation == 'destroy'
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: c4finder-terraform-deploy.yml
          branch: ${{ github.ref_name }}
          name: terraform-state-${{ github.ref_name }}
          path: ${{ env.TF_WORKING_DIR }}
          if_no_artifact_found: fail

      - name: Terraform Destroy
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.operation == 'destroy'
        run: terraform -chdir="$TF_WORKING_DIR" destroy -auto-approve
